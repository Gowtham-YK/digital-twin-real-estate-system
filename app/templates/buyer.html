<!DOCTYPE html>
<html>
<head>
    <title>Buyer Prediction</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Heatmap -->
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <link rel="stylesheet" href="/static/buyer.css">

    <!-- 🔥 ADD THIS STYLE -->
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            width: 0%;
            height: 2px;
            background: #00c6ff;
            position: absolute;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* TITLE */
        h2 {
            margin-top: 30px;
            text-shadow: 0 0 10px rgba(0,198,255,0.6);
        }

        /* FORM */
        input {
            padding: 12px;
            margin: 10px;
            width: 200px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(0,114,255,0.4);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0,198,255,0.6);
        }

        /* PRICE */
        #price {
            margin-top: 20px;
            font-size: 20px;
            text-shadow: 0 0 8px rgba(0,198,255,0.5);
        }

        /* MAP */
        #map {
            height: 450px;
            width: 80%;
            margin: 30px auto;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>

    <!-- 🔥 ADD THIS NAVBAR -->
    <div class="navbar">
        <div class="logo">🏠 Digital Twin Real Estate System</div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About Us</a>
            <a href="/contact">Contact</a>
        </div>
    </div>

    <h2>Buyer Price Prediction</h2>

    <div class="form">
        <input id="location" placeholder="Enter area (e.g., BTM Layout)">
        <input id="sqft" placeholder="Square Feet">
        <input id="bhk" placeholder="BHK">

        <button onclick="predict()">Predict</button>
    </div>

    <h3 id="price"></h3>

    <div id="map"></div>

    <script src="/static/map.js"></script>
    <script src="/static/buyer.js"></script>

</body>
</html>
