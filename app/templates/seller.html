<!DOCTYPE html>
<html>
<head>
    <title>Seller Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
       body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* TITLE */
h2 {
    font-size: 30px;
    text-shadow: 0 0 10px rgba(0,198,255,0.6);
}

/* INPUT ROW */
.row {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 25px;
}

/* INPUT FIELDS */
input {
    padding: 12px;
    width: 190px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

input::placeholder {
    color: rgba(255,255,255,0.7);
}

input:focus {
    transform: scale(1.05);
}

/* BUTTON */
button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-weight: 500;
    transition: 0.3s;
    box-shadow: 0 5px 20px rgba(0,114,255,0.4);
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 8px 30px rgba(0,198,255,0.6);
}

/* TIME BUTTONS */
.time-buttons {
    margin-top: 25px;
}

.time-buttons button {
    margin: 8px;
}

/* GROWTH TEXT */
#growth {
    margin-top: 25px;
    font-weight: bold;
    font-size: 18px;
    text-shadow: 0 0 8px rgba(0,198,255,0.5);
}

/* SELECTED PRICE */
#selectedPrice {
    margin-top: 15px;
    font-size: 18px;
}

/* CHART CONTAINER (GLASS CARD STYLE) */
#chartContainer {
    width: 750px;
    margin: 40px auto;
    padding: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

#chartContainer:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 50px rgba(0,198,255,0.3);
}

/* SMOOTH SCROLL */
html {
    scroll-behavior: smooth;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-weight: 400;
    position: relative;
}

.nav-links a::after {
    content: '';
    width: 0%;
    height: 2px;
    background: #00c6ff;
    position: absolute;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}
    </style>
</head>

<body>

    <!-- 🔥 NAVBAR -->
<div class="navbar">
    <div class="logo">🏠 Digital Twin Real Estate System</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about">About Us</a>
        <a href="/contact">Contact</a>
    </div>
</div>

<h2>🏠 Seller Property Analysis</h2>

<div class="row">
    <input id="location" placeholder="Location">
    <input id="sqft" placeholder="Sqft">
    <input id="bhk" placeholder="BHK">
    <input id="price" placeholder="Bought Price">
</div>

<button onclick="predictSeller()">Predict</button>

<h3 id="growth"></h3>

<div class="time-buttons">
    <button onclick="showPrice('1y')">1 Year</button>
    <button onclick="showPrice('5y')">5 Years</button>
    <button onclick="showPrice('10y')">10 Years</button>
</div>

<h3 id="selectedPrice"></h3>

<div id="chartContainer">
    <canvas id="chart"></canvas>
</div>

<script src="/static/seller.js"></script>

</body>
</html>
