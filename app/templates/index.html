<!DOCTYPE html>
<html>
<head>
    <title>Real Estate App</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    overflow-x: hidden;
}

/* 🔥 NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-weight: 400;
    position: relative;
}

/* underline animation */
.nav-links a::after {
    content: '';
    width: 0%;
    height: 2px;
    background: #00c6ff;
    position: absolute;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

/* MAIN CENTER */
.container {
    height: calc(100vh - 70px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* 🔥 TITLE GLOW */
h1 {
    margin-bottom: 20px;
    font-size: 32px;
    text-shadow: 0 0 10px rgba(0,198,255,0.6);
}

/* 🔥 CARD STYLE (UPGRADED) */
.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(20px);
    border-radius: 18px;
    padding: 30px;
    width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    margin: 15px;
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 15px 50px rgba(0,198,255,0.3);
}

/* INPUTS */
input {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    border: none;
    border-radius: 10px;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
}

input::placeholder {
    color: rgba(255,255,255,0.7);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 20px rgba(0,114,255,0.4);
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(0,198,255,0.6);
}

/* SECTIONS */
#about, #contact {
    padding: 60px 20px;
    text-align: center;
}

#about h2, #contact h2 {
    margin-bottom: 10px;
    text-shadow: 0 0 8px rgba(0,198,255,0.5);
}

/* 🔥 SMOOTH SCROLL */
html {
    scroll-behavior: smooth;
}
    </style>
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <div class="logo">🏠 Digital Twin Real Estate System</div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/about">About Us</a>
            <a href="/contact">Contact</a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">

        <h1>Real Estate Intelligence</h1>

        <!-- LOGIN CARD -->
        <div class="card" id="loginCard">
            <h3>Login</h3>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <button onclick="login()">Login</button>
        </div>

        <!-- ROLE CARD -->
        <div class="card" id="roles" style="display:none;">
            <h3>Select Role</h3>

            <button onclick="goBuyer()">Buyer</button>
            <button onclick="goSeller()">Seller</button>
        </div>

    </div>

    <script>
        function login() {
            document.getElementById("loginCard").style.display = "none";
            document.getElementById("roles").style.display = "block";
        }

        function goBuyer() {
            window.location.href = "/buyer";
        }

        function goSeller() {
            window.location.href = "/seller";
        }
    </script>

</body>
</html>
