name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install DVC
      run: |
        pip install dvc

    - name: Check Data Files
      run: |
        echo "Checking data folder..."
        ls data

    - name: Run DVC Pipeline
      run: |
        python -m dvc repro

    - name: Verify Model Files
      run: |
        echo "Checking generated models..."
        ls models/buyer_model/model.pkl
        ls models/seller_model/model.pkl

    - name: CI/CD Success
      run: echo "Pipeline executed successfully"
